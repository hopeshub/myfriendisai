name: Deploy after data update

on:
  push:
    branches: [main]
    paths:
      - 'data/*.json'
      - 'web/data/*.json'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger Vercel redeploy
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$DEPLOY_HOOK" ]; then
            curl -s -X POST "$DEPLOY_HOOK"
            echo "Vercel redeploy triggered."
          else
            echo "No VERCEL_DEPLOY_HOOK_URL secret set. Skipping redeploy."
          fi
