name: Daily Reddit Collection

on:
  schedule:
    # Runs at 06:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit updated JSON files

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run daily collection
        run: python scripts/collect_daily.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots.json data/subreddits.json data/tracker.db web/data/snapshots.json web/data/subreddits.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"

      - name: Push changes
        run: git push

      - name: Trigger Vercel redeploy
        if: ${{ secrets.VERCEL_DEPLOY_HOOK_URL != '' }}
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
