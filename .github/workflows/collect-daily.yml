name: Daily Reddit Collection

# NOTE: This workflow is currently non-functional because the SQLite database
# (data/tracker.db, ~20GB) lives locally and cannot be stored in git.
# Daily collection runs locally via launchd instead.
# See: scripts/com.myfriendisai.collect-daily.plist
#
# This workflow is kept for reference and could be adapted if the DB is moved
# to a cloud store (e.g., S3, R2) in the future.

on:
  workflow_dispatch: # Manual trigger only for now

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run daily collection
        run: python scripts/collect_daily.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots.json data/subreddits.json data/keywords.json data/keyword_trends.json
          git add web/data/snapshots.json web/data/subreddits.json web/data/keywords.json web/data/keyword_trends.json
          git diff --staged --quiet || git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"

      - name: Push changes
        run: git push

      - name: Trigger Vercel redeploy
        if: ${{ secrets.VERCEL_DEPLOY_HOOK_URL != '' }}
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
