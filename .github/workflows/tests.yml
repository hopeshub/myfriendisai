name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'
      - 'config/**'
      - 'requirements.txt'
      - 'pytest.ini'
      - '.github/workflows/tests.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'
      - 'config/**'
      - 'requirements.txt'
      - 'pytest.ini'
      - '.github/workflows/tests.yml'

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest
        run: pytest tests/ -v
