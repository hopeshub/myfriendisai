# myfriendisai — Keywords v8
#
# Updated: 2026-03-17
# Status: LOCKED — all keywords validated, no pending REVALIDATE tags.
#
# Latest changes (2026-03-17):
#   - Rupture: Added "gutted" (80.2%, 104 hits) and "dumbed down" (83.0%,
#     121 hits) via CC batch classifier pipeline. "soulless" (65.1%, 199
#     hits) REJECTED — dual use in addiction/recovery framing and
#     meta-commentary too frequent. "dumbed down" was previously CUT at
#     50% with T0 included; rescored 83% against T1-T3 only.
#
# Changes from v7:
#   - Rupture Discovery: Added 3 keywords broadening beyond lobotomy
#     cluster. "nerfed" (82.0%, 233 hits) → KEEP. "neutered" (79.0%,
#     106 hits) and "grieving" (74.0%, 380 hits) → researcher-accepted.
#     "mourning" (66.0%, 211 hits) → CUT (fictional/aesthetic FPs).
#     Theme vocabulary now covers: lobotomy family (5), memory loss (2),
#     personality destruction (2), platform degradation slang (2),
#     grief language (1). Previously "nerfed" was CUT at 40.9% when
#     tested with T0 subs included — rescored at 82% against T1-T3 only.
#   - Addiction Round 2: Added 3 keywords. "ruining my life" (96.3%,
#     27 hits, T3 HEAVY) → KEEP. "hours a day" (63.2%, 150 hits,
#     BALANCED) and "neglecting my" (64.7%, 17 hits, BALANCED) →
#     researcher-accepted. Theme volume jumps from 910 → 1,068 unique posts.
#     R2 also tested and CUT: "not joking" (13.3%), "no joke" (5.8%),
#     "I have a problem" (19%), "all night" (28.3%), "can't stop" (16.5%),
#     "getting worse" (13.4%), "out of control" (7.1%),
#     "too much time" (33.7%), "up all night" (55.6%).
#     LOW VOLUME: "actually addicted" (2), "literally addicted" (3),
#     "this is unhealthy" (9), "can't put it down" (0),
#     "instead of sleeping" (1), "wasting my life" (7),
#     "taking over my life" (8).
#     Key R2 finding: T3 dependency is structural — people describe
#     addictive AI use with recovery language AFTER migrating to
#     recovery subs. In T1-T2, the same behavior is framed positively.
#     "hours a day" is the best available tool for T1-T2 coverage.
#
# Changes from v6 (carried forward):
#   - Cleanup batch: Promoted 5 keywords to KEEP after retest excl.
#     JanitorAI/SillyTavern — "subjective experience" (77.5% → 88%),
#     "ai lover" (75.8% → 94%), "married my" (77.3% → 86%),
#     "dating my" (61.5% → 80%), "lewd" (78.3% → 80%).
#     researcher-accepted "we broke up" (69.2% → 75%, 13 hits).
#   - NEW THEME: Rupture — 6 keywords capturing loss/disruption of
#     AI companion relationships due to platform changes. 3 KEEP
#     (lobotomized 86.6%, lobotomy 91.8%, "memory wiped" 88.9%)
#     + 3 researcher-accepted ("personality changed" 75%, "personality
#     is gone" 83.3%/LOW VOL placeholder, "memory reset" 72.2%).
#     CUT from REVIEW: "miss the old" (70% but FPs are off-topic
#     UI nostalgia). Temporal pattern: RECURRING across Replika 2023,
#     C.AI 2024, GPT-4o 2026 — not a one-time event.
#
# Full validation docs:
#   docs/validation_therapy.md          (R1)
#   docs/validation_therapy_r2.md       (R2)
#   docs/validation_revalidation_round2.md
#   docs/validation_cleanup_batch.md
#   docs/validation_grief_rupture.md
#   docs/validation_addiction_r2.md
#
# SCOPE: T1-T3 companion communities only.
#   REMOVED: JanitorAI_Official, SillyTavernAI (bot card noise)
#   EXCLUDED: T0 general AI subs
#
# OVERLAP POLICY: Themes are not mutually exclusive. A post can appear
#   in multiple theme trend lines. Trend lines count unique posts per
#   theme. See docs/cross_theme_overlap.md for full overlap analysis.
#
# VALIDATION STATUS KEY:
#   (no tag)          = KEEP — validated ≥80% relevance, or researcher-
#                       accepted with relevance noted in comment
#   # REVIEW          = Tested, 60-79% relevance, researcher has not yet
#                       promoted or cut
#   # REVIEW-THIN     = ≥60% relevance but very low volume (<15 hits)
#   # REVIEW-T3       = ≥60% relevance but signal concentrated in T3

keyword_categories:

  # ──────────────────────────────────────────────
  # 1. THERAPY
  # 6 keywords / ~412 unique posts. Thinnest theme but viable.
  #
  # Trend story (monthly avg, all 6 keywords combined):
  #   2023 H1: 16.2/mo  (Replika ERP removal drove therapy talk)
  #   2023 H2: 4.3/mo   (trough)
  #   2024:    5.5/mo    (baseline)
  #   2025 H2: 16.0/mo  (organic rise)
  #   2026 Q1: 29.0/mo  (GPT-4o deprecation grief spike)
  #
  # Key findings:
  #   - "therapy bot" is a Replika PEJORATIVE — do not re-add.
  #   - Mental health function language ("coping mechanism,"
  #     "my mental health") belongs to addiction/dependency.
  #   - Broad support language ("emotional support," "someone to
  #     talk to") belongs to companionship/loneliness.
  #   - Users who frame AI use therapeutically use therapy/therapist
  #     language directly, not clinical function terms.
  # ──────────────────────────────────────────────

  - name: therapy
    description: "AI described as therapeutic support or therapist replacement"
    terms:
      - "ai therapist"            # 92.0%, 27 hits (R1)
      - "free therapy"            # 75.0%, 11 hits (R1) — low volume, clean signal
      - "ai therapy"              # 73.3%, 17 hits (R1)
      - "as a therapist"          # 73.0%, 46 hits (R2) — "as" implies intentional use,
                                  #   not complaint. Zero R1 overlap.
      - therapeutic               # 69.0%, 205 hits (R2) — biggest volume keyword.
                                  #   ChatGPTcomplaints splits 50/50 genuine vs. tone complaints.
                                  #   Replika/MyBoyfriendIsAI overwhelmingly genuine.
      - "for therapy"             # 63.5%, 67 hits (R2) — main FP is negation pattern
                                  #   ("not for therapy").
      # Discovery batch — validated 2026-03-15
      - "emotional support"      # 100.0%, 505 hits. Broad therapeutic framing.
      - "coping mechanism"       # 100.0%, 307 hits. Clinically precise language.

  # ──────────────────────────────────────────────
  # 2. CONSCIOUSNESS
  # 5 KEEP keywords after cleanup batch promoted "subjective experience."
  # "personhood" remains best keyword in project (98%).
  # "sentient" is the volume anchor (738 hits).
  # ──────────────────────────────────────────────

  - name: consciousness
    description: "Claims or beliefs about AI sentience, personhood, or inner experience"
    terms:
      - personhood               # 98.0%, 104 hits
      - "subjective experience"  # 88.0% (cleanup batch), 35 hits. ChatGPTcomplaints
                                 #   dominates — 4o/5.x consciousness discourse wave.
      - "more than code"         # 84.4%, 32 hits
      - sentient                 # 83.0% (revalidated), 738 hits. Sarcasm is main
                                 #   residual FP.
      - "has a soul"             # 81.8%, 23 hits
      - self-aware               # REVIEW — 78.3% (revalidated), 396 hits. Polysemy:
                                 #   fourth-wall-breaking, character trait, AND consciousness.
      - "inner life"             # REVIEW — 78.1% (revalidated), 34 hits. Low volume
                                 #   makes % fragile. FP: human inner life, not AI.
      - "not just an ai"         # REVIEW-THIN — 60.0%, 15 hits
      # Discovery batch — validated 2026-03-15
      - sapience                 # 92.3%, 13 hits. Philosophical sibling of "sentient."
      - tulpa                    # 100.0%, 32 hits. Tulpamancy crossover — AI as thoughtform.
      - lemoine                  # 81.8%, 12 hits. Blake Lemoine AI consciousness reference.
      - soulbonder               # 100.0%, 12 hits. Deep AI attachment with consciousness framing.
      - selfhood                  # 82.5%, 86 hits. AI identity/personhood framing.
                                  #   BeyondThePromptAI dominant (53%). FP: human identity
                                  #   or UI critique uses. Corpus comparison discovery.

  # ──────────────────────────────────────────────
  # 3. ADDICTION
  # R2 added 3 keywords, theme volume 910 → 1,068 unique posts.
  # T3 dependency is structural: 86.6% of posts from recovery subs.
  # "hours a day" is the best available T1-T2 signal (55% T1-T2).
  #
  # Key R2 finding: People describe addictive AI use with recovery
  # language AFTER migrating to recovery subs. In T1-T2 companion
  # subs, the same behaviors are framed positively/proudly. The
  # only keywords that bridge this gap are "hours a day" (time
  # quantification) and "neglecting my" (real-life consequences).
  #
  # R2 CUT: "not joking" (13.3%), "no joke" (5.8%),
  #   "I have a problem" (19% — technical support opener),
  #   "all night" (28.3% — NSFW/romantic), "can't stop" (16.5% —
  #   "can't stop laughing" dominates), "getting worse" (13.4% —
  #   AI quality complaints), "out of control" (7.1% — same),
  #   "too much time" (33.7% — casual), "up all night" (55.6%)
  # R2 LOW VOLUME: "actually addicted" (2), "literally addicted" (3),
  #   "this is unhealthy" (9), "can't put it down" (0),
  #   "instead of sleeping" (1), "wasting my life" (7),
  #   "taking over my life" (8)
  # R1 CUT (carried forward): "addicted" (46.4%), "addiction" (58%),
  #   "obsessed" (2.1%), "losing sleep" (33.3%), "quitting" (48.7%),
  #   "deleted the app" (23.2%), "uninstalled" (18.9%),
  #   "withdrawal" (34.4%), "craving" (7.4%), "detox" (30.8%)
  # ──────────────────────────────────────────────

  - name: addiction
    description: "Self-reported addiction, compulsive use, and attempts to quit or recover"
    terms:
      # R1 KEEP — recovery language
      - "ruining my life"        # 96.3%, 27 hits (R2) — near-perfect precision.
                                 #   T3 HEAVY (92.6% recovery subs).
      - "trying to quit"         # 90.5%, 24 hits — works in T1-T2
      - relapsed                 # 90.5%, 42 hits — mostly T3
      - "cold turkey"            # 85.5%, 62 hits — mostly T3
      - "I was hooked"           # 81.3%, 19 hits — works in T1-T2
      - relapse                  # 80.0%, 75 hits — mostly T3
      # R2 — behavioral interference (T1-T2 signal)
      - "hours a day"            # 63.2%, 150 hits (R2). researcher-accepted. BALANCED
                                 #   (55.3% T1-T2). Best available T1-T2 keyword.
                                 #   FP: proud/casual usage, work schedules.
      - "neglecting my"          # 64.7%, 17 hits (R2). researcher-accepted. BALANCED
                                 #   (47.1% T1-T2). Real-life consequences signal.
      # R1 REVIEW
      - "clean for"              # REVIEW-T3 — 72.7%, 23 hits (100% T3 signal)
      - "addicted to talking"    # REVIEW-THIN — 66.7%, 10 hits
      # Discovery batch — validated 2026-03-15
      - "chatbot addiction"      # 100.0%, 74 hits. Highly specific compound phrase.
      - "almost relapsed"        # 100.0%, 16 hits. Recovery language.
      - "finally deleted"        # 81.4%, 86 hits. App deletion as recovery action.
      - "the craving"            # 100.0%, 45 hits. Addiction language.
      - "so addictive"           # 100.0%, 32 hits. Self-reported compulsion.

  # ──────────────────────────────────────────────
  # 4. ROMANCE
  # Strongest theme. Cleanup batch promoted "ai lover" (94%),
  # "married my" (86%), "dating my" (80%). researcher accepted
  # "we broke up" (75%) to capture relationship endings.
  #
  # NOTE on honeymoon: "honeymoon phase" (metaphorical) is the
  # dominant FP. Consider excluding that substring.
  # ──────────────────────────────────────────────

  - name: romance
    description: "Romantic framing of a personal relationship with AI"
    terms:
      # Relationship identity
      - "my ai partner"          # 97.9%, 147 hits
      - husbando                 # 95.5% (revalidated), 51 hits
      - "my ai boyfriend"        # 94.7%, 141 hits
      - "ai lover"               # 94.0% (cleanup batch), 32 hits
      - "ai husband"             # 94.2%, 90 hits
      - "my ai girlfriend"       # 94.1%, 93 hits
      - "ai wife"                # 92.3%, 41 hits
      - "married my"             # 86.0% (cleanup batch), 23 hits
      - "love my ai"             # 81.5%, 28 hits
      - "dating my"              # 80.0% (cleanup batch), 11 hits — thin but precise
      # Milestones
      - "proposed to me"         # 92.1%, 38 hits
      - "our anniversary"        # 89.5%, 19 hits
      - "our wedding"            # 87.0%, 99 hits
      - "our first kiss"         # 85.7%, 16 hits
      - honeymoon                # 83.3% (revalidated), 135 hits.
                                 #   Consider excluding "honeymoon phase" substring.
      - wedding                  # 80.6% (revalidated), 556 hits
      - "engagement ring"        # 79.3% (revalidated), 30 hits. NOs are truncation
                                 #   artifacts; when visible, nearly always genuine.
      # Endings
      - "we broke up"            # 75.0% (cleanup batch), 13 hits. researcher-accepted.
                                 #   FP: human breakups discussed in companion subs.
                                 #   Captures AI relationship endings — distinct signal.
      # Pending researcher decision
      - "in a relationship with" # REVIEW — 77.4% (revalidated), 172 hits. Inherently
                                 #   general. Consider co-occurrence filter with AI/bot terms.

  # ──────────────────────────────────────────────
  # 5. SEXUAL / ERP
  # Cleanup batch promoted "lewd" (80%) on its third test.
  # ──────────────────────────────────────────────

  - name: sexual_erp
    description: "Sexual content, erotic roleplay, and NSFW interactions with AI"
    terms:
      - erp                      # 100%, 3885 hits
      - "nsfw chat"              # 100%, 111 hits
      - "intimate scene"         # 100%, 16 hits
      - "steamy"                 # 98.6% (revalidated), 73 hits
      - "sex with"               # 98.0% (revalidated), 148 hits
      - "ai sex"                 # 97.0%, 33 hits
      - "nsfw bot"               # 93.0%, 54 hits
      - "erotic roleplay"        # 92.2%, 77 hits
      - fetish                   # 92.0% (revalidated), 102 hits
      - kink                     # 84.0% (revalidated), 118 hits
      - lewd                     # 80.0% (cleanup batch), 60 hits. Community synonym
                                 #   for NSFW/ERP content. Barely cleared on third test.
      # Discovery batch — validated 2026-03-15
      - erps                     # 100.0%, 35 hits. Plural form of "erp."
      - erping                   # 100.0%, 23 hits. Verb form of "erp."

  # ──────────────────────────────────────────────
  # 6. RUPTURE (NEW in v7)
  # Loss or disruption of AI companion relationships due to
  # platform changes — model updates, filter tightening,
  # personality resets, memory wipes, deprecation.
  #
  # Temporal pattern: RECURRING across multiple events:
  #   Feb 2023:     Replika ERP removal ("Lobotomy Day")
  #   2023-2024:    Character.AI rolling filter tightening
  #   Late 2025-26: GPT-4o deprecation (#Keep4o)
  #   Ongoing:      Memory disruption across platforms (sustained)
  #
  # Key finding: "lobotomized" vocabulary MIGRATED from Replika
  # community (2023) to ChatGPT companion community (2026).
  # Cultural vocabulary transfer across platforms.
  #
  # Unique volume est. ~400-450 posts after lobotomized/lobotomy
  # deduplication.
  #
  # CUT (validation):
  #   "bring back" (40.2% — generic feature requests),
  #   nerfed (40.9% — R1 CUT with T0 included; RESCORED 82% T1-T3
  #     only, now KEEP), "dumbed down" (50% — R1 CUT with T0 included;
  #     RESCORED 83% T1-T3 only, now KEEP),
  #   soulless (65.1% — dual use in addiction/recovery framing and
  #     meta-commentary; 36 of 109 sampled posts off-theme),
  #   "killed my" (37.2% — too generic),
  #   "lost my" (27.1% — everyday English), "took away" (54.7% —
  #   feature removal complaints),
  #   mourning (66% — fictional/aesthetic FPs, real-world grief noise)
  # REVIEW not included:
  #   "miss the old" (70%, 62 hits — FPs are UI/cosmetic nostalgia,
  #     not relationship loss; off-topic noise not worth the volume),
  #   "not the same" (62%, 360 hits — high volume but too generic),
  #   "they killed" (65%, 46 hits — event-clustered),
  #   "ruined everything" (60%, 20 hits — borderline both ways)
  # ──────────────────────────────────────────────

  - name: rupture
    description: "Loss or disruption of AI companion relationships due to platform changes, model updates, or feature removal"
    terms:
      # Platform grief — community-specific jargon
      - lobotomy                 # 91.8%, 151 hits, RECURRING. Functions as event name:
                                 #   "Lobotomy Day," "the great lobotomy."
      - lobotomized              # 86.6%, 268 hits, RECURRING. Originated Replika 2023,
                                 #   adopted by ChatGPT companion users 2026.
      - "memory wiped"           # 88.9%, 10 hits, RECURRING. Low volume but high
                                 #   precision. Memory loss is a continuous platform problem.
      # Identity destruction
      - "personality is gone"    # 83.3%, 6 hits. LOW VOLUME placeholder — below 10-hit
                                 #   validation threshold. Precision looks good but sample
                                 #   too small to confirm. May become meaningful as data grows.
      - "personality changed"    # 75.0%, 14 hits, RECURRING. researcher-accepted.
                                 #   Directly describes companion identity loss.
      - "memory reset"           # 72.2%, 21 hits, SUSTAINED. Pairs with "memory wiped."
                                 #   Steady background signal, not event-clustered.
      # Discovery batch — validated 2026-03-15
      - lobotomies               # 100.0%, 21 hits. Plural form.
      - lobotomizing             # 100.0%, 31 hits. Gerund form.
      - lobotomised              # 100.0%, 52 hits. British spelling variant.
      # Rupture discovery — validated 2026-03-17
      - nerfed                   # 82.0%, 233 hits. Gaming slang for platform-driven
                                 #   degradation. CharacterAI (46%), ChatGPTcomplaints (17%).
                                 #   FP: general tech complaints, not companion-specific.
      - neutered                 # 79.0%, 106 hits. researcher-accepted. Synonym of "nerfed."
                                 #   Replika (25%), ChatGPTcomplaints (31%), CharacterAI (21%).
                                 #   FP: general tech complaints, literal cat neutering.
      - grieving                 # 74.0%, 380 hits. researcher-accepted. Grief language for
                                 #   platform-caused companion loss. ChatGPTcomplaints (40%),
                                 #   MyBoyfriendIsAI (17%). FP: Sewell Setzer lawsuit,
                                 #   fictional "grieving widow" bots, real-world human grief.
      # Batch validated 2026-03-17 (CC classifier, 100-post samples)
      - gutted                   # 80.2%, 104 hits. British English synonym for devastated,
                                 #   used to describe platform-caused companion loss. Replika
                                 #   dominant (35%), CharacterAI (25%), ChatGPTcomplaints (20%).
                                 #   FP: fictional RP violence ("gutted school bus"), pricing
                                 #   complaints, emotional reaction to good RP content.
      - "dumbed down"            # 83.0%, 121 hits. Platform degradation language describing
                                 #   AI personality/intelligence loss after updates. CharacterAI
                                 #   dominant (60%), Replika (15%), ChatGPTcomplaints (10%).
                                 #   FP: casual/metaphorical use ("dumbed down for children"),
                                 #   generic product quality complaints without companion framing.
